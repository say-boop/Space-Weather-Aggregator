<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#0A84FF">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<link rel="stylesheet" href="/static/css/style.css">
	<link rel="manifest" href="/static/manifest.json">
	<link rel="icon" type="inage/svg+xml+png" href="/static/icons/extraterrestrial-outpost.png">
	<title>Space Weather Aggregator</title>
</head>
<body>
	<header class="header">
		<h1 data-i18n="title">🛰️ Space Weather Dashboard</h1>
		<span id="connection-status">🟢 Live</span>
		<span id="last-updated">--</span>
		<div class="header-btn-export">
			<button id="export_btn" class="btn-primary" data-i18n="export">📄 Export Report</button>
		</div>
		<div class="header-btn-export">
			<button id="lang-btn" class="btn-primary">🇷🇺 RU</button>
		</div>
	</header>
	<main class="dashboard">
		<div class="card">
			<h2 data-i18n="solar_flares">☀️ Solar Flares</h2>
			<table>
				<thead>
					<tr>
						<th>Time</th>
						<th>Class</th>
						<th>Source</th>
					</tr>
				</thead>
				<tbody id="flares-table">
			
				</tbody>
			</table>
		</div>
		<div class="card">
			<h2 data-i18n="cme">💨 Coronal Mass Ejections</h2>
			<table>
				<thead>
					<tr>
						<th>Time</th>
						<th>Speed (km/s)</th>
						<th>Type</th>
					</tr>
				</thead>
				<tbody id="cme-table">
		
				</tbody>
			</table>
		</div>
		<div class="card">
			<h2 data-i18n="kp_index">🧲 Kp Index</h2>
			<span id="kp-value">--</span>
			<span id="kp-status">--</span>
			<canvas id="kp-chart"></canvas>
			<canvas id="kp-history-chart"></canvas>
		</div>
		<div class="card">
			<h2 data-i18n="iss_position">🛰️ ISS Position</h2>
			<span id="iss-coords">--</span>
			<div id="iss-map"></div>
			<div class="iss-controls">
				<div class="input-group">
					<label>Your latitude:</label>
					<input type="text" id="user-lat" value="35.75" placeholder="0.00">
				</div>
				<div class="input-group">
					<label>Your longitude:</label>
					<input type="text" id="user-lon" value="37.61" placeholder="0.00">
				</div>
				<button id="check-passes-btn" class="btn-primary">Check Passes</button>
			</div>
			<div id="iss-passes" style="margin-top:8px;"></div>
		</div>
		<div class="card">
			<h2 data-i18n="aurora">🌌 Aurora Forecast</h2>
			<span id="aurora-obs-time"></span>
			<span id="aurora-forecast-time"></span>
			<span id="aurora-intensity"></span>
		</div>
	</main>
	<footer class="footer">
		<button id="refresh_btn" data-i18n="refresh">🔄 Refresh Now</button>
		<p data-i18n="footer_text">Data updates every 5 minutes • WebSocket every 30 seconds</p>
	</footer>
	<script src="/static/js/app.js"></script>
	<script>
		if ("serviceWorker" in navigator) {
			navigator.serviceWorker.register("/static/js/sw.js")
		}
	</script>
</body>
</html>
